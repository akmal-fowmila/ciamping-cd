ping-devops:
  global:
    envs:
      PING_IDENTITY_DEVOPS_USER: "akmal@likemindsconsulting.com"
      PING_IDENTITY_DEVOPS_KEY: "6bf887b0-e52c-bef0-d55c-c08854495bee"
      PING_IDENTITY_ACCEPT_EULA: "YES"
    license:
      acceptEULA: true
    services:
      useLoadBalancerForDataService: true
    # workload:
    #   statefulSet:
    #     persistentvolume:
    #       enabled: true
    #       volumes:
    #         out-dir:
    #           mountPath: /opt/out
    #           persistentVolumeClaim:
    #             accessModes:
    #               - ReadWriteOnce
    #             storageClassName: "ping-directory-ssd"
    #             resources:
    #               requests:
    #                 storage: 80Gi

  pingdirectory:
    enabled: true
    workload:
      statefulSet:
        persistentvolume:
          enabled: true
          volumes:
            out-dir:
              mountPath: /opt/out
              persistentVolumeClaim:
                accessModes:
                  - ReadWriteOnce
                storageClassName: "ping-directory-ssd"
                resources:
                  requests:
                    storage: 80Gi  
    container:
      replicaCount: 2        # ← correct location per chart schema
      resources:
        requests:
          cpu: 500m
          memory: 4Gi
        limits:
          cpu: 6
          memory: 16Gi
      envFrom:
        - secretRef:
            name: ping-server-profile-git-secret
    envs:
      LEGACY_PROFILE_CHECK: "false"
      K8S_POD_HOSTNAME_PREFIX: "gcp-uscentral-pd-pingdirectory-"
      K8S_SEED_HOSTNAME_PREFIX: "gcp-uscentral-pd-pingdirectory-"
      K8S_POD_HOSTNAME_SUFFIX: ".gcp-uscentral-pd-pingdirectory-cluster-uscentral.pd-dev-ns.svc.cluster.local"
      K8S_SEED_HOSTNAME_SUFFIX: ".gcp-uscentral-pd-pingdirectory-cluster-uscentral.pd-dev-ns.svc.cluster.local"
      K8S_CLUSTER: "us-central-gke"
      K8S_SEED_CLUSTER: "us-central-gke"
      K8S_CLUSTERS: "us-central-gke us-west-gke"
      SERVER_PROFILE_URL: "https://github.com/akmal-fowmila/ciam-ping-serverprofile.git"
      SERVER_PROFILE_PATH: "pingdirectory"
      SERVER_PROFILE_BRANCH: "main"
      REINDEX_TYPE: "none"
      REIMPORT_DATA: "false"
      ADMIN_USER_PASSWORD_FILE: "/opt/staging/pd.profile/.sec/admin-user-password"
      ROOT_USER_PASSWORD_FILE: "/opt/staging/pd.profile/.sec/root-user-password"
      ENCRYPTION_PASSWORD_FILE: "/opt/staging/pd.profile/.sec/encryption-password"
    services:
      clusterServiceName: pingdirectory-cluster-uscentral
      replication:
        containerPort: 8989
      ldap:
        servicePort: 389
        containerPort: 1389
        dataService: true
      ldaps:
        type: LoadBalancer
        servicePort: 636
        containerPort: 1636
        dataService: true
        clusterService: true
      https:
        type: LoadBalancer
        servicePort: 443
        containerPort: 1443
        ingressPort: 443
        dataService: true

  pingdataconsole:
    enabled: true
    container:
      resources:
        requests:
          cpu: 128m
          memory: 0.5Gi
        limits:
          cpu: 1
          memory: 1Gi
    services:
      https:
        type: LoadBalancer
        containerPort: 8443
        servicePort: 8443
        dataService: true





























